<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cotizá tu seguro | Sudden Broker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f3ef;
  display: flex;
  justify-content: center;
  padding: 2rem;
}

.container {
  max-width: 600px;
  width: 100%;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 2rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.progress {
  display: flex;
  margin-bottom: 20px;
}

.progress div {
  flex: 1;
  height: 6px;
  background: #ddd;
  margin-right: 5px;
  border-radius: 10px;
}

.progress .active {
  background: #1e4d8c;
}

.step {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s;
  display: none;
}

.step.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

label {
  font-size: 13px;
  margin-top: 10px;
  display: block;
}

.desc {
  font-size: 12px;
  color: #7a746c;
  margin-bottom: 5px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: #1e4d8c;
  color: white;
  cursor: pointer;
  width: 100%;
}

.nav {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.tipo {
  display: flex;
  gap: 10px;
}

.tipo div {
  flex: 1;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.tipo .active {
  border-color: #1e4d8c;
  background: #e8eef7;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1 style="font-family:'DM Serif Display'">Cotizá tu seguro</h1>
<p style="font-size:13px;color:#7a746c">
📲 Respuesta rápida por WhatsApp
</p>

<div class="progress">
  <div id="p0" class="active"></div>
  <div id="p1"></div>
  <div id="p2"></div>
</div>

<form>

<div class="step active" id="step-0">
  <h3>¿Qué querés asegurar?</h3>

  <div class="tipo">
    <div onclick="setTipo('hogar', this)">🏠 Hogar</div>
    <div onclick="setTipo('comercio', this)">🏢 Comercio</div>
  </div>

  <div class="nav">
    <button type="button" onclick="go(1)">Continuar</button>
  </div>
</div>

<div class="step" id="step-1">
  <h3>Datos personales</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="apellido" placeholder="Apellido">
  <input id="direccion" placeholder="Dirección">
  <input id="email" placeholder="Email">
  <input id="tel" placeholder="WhatsApp">

  <div class="nav">
    <button type="button" onclick="go(0)">Atrás</button>
    <button type="button" onclick="go(2)">Continuar</button>
  </div>
</div>

<div class="step" id="step-2">
  <h3>Coberturas del hogar</h3>

  <p class="desc">
  Si no sabés los valores, dejalos en blanco y te asesoro.
  </p>

  <!-- COMERCIO -->
  <div id="actividadBox" style="display:none">
    <label>Actividad del comercio</label>
    <input id="actividad" placeholder="Ej: Kiosco, oficina, ferretería">

    <label>Valor del contenido</label>
    <input id="contenidoCom" oninput="formatMoney(this)">

    <label>Robo mercadería</label>
    <input id="roboMercaderia" oninput="formatMoney(this)">

    <label>Incendio contenido</label>
    <input id="incendioCom" oninput="formatMoney(this)">

    <label>Equipos electrónicos</label>
    <input id="equiposCom" oninput="formatMoney(this)">

    <label>Cristales vidriera</label>
    <input id="vidrieraCom" oninput="formatMoney(this)">
  </div>

  <!-- HOGAR -->
  <div id="hogarBox">
    <label>Tipo de propiedad</label>
    <input id="tipoProp">

    <label>Medidas de seguridad</label>
    <select id="seguridad">
      <option value="">Seleccionar</option>
      <option>Sin alarma</option>
      <option>Alarma sin monitoreo</option>
      <option>Alarma con monitoreo</option>
    </select>

    <label>Valor del inmueble (USD)</label>
    <input id="valorInmueble" oninput="formatMoney(this)">

    <label>Cristales</label>
    <input id="cristales" oninput="formatMoney(this)">

    <label>Equipos electrónicos</label>
    <input id="equipos" oninput="formatMoney(this)">

    <label>Televisores</label>
    <input id="tv" oninput="formatMoney(this)">

    <label>Notebook</label>
    <input id="notebook" oninput="formatMoney(this)">

    <label>Bienes específicos</label>
    <input id="bienes" oninput="formatMoney(this)">
  </div>

  <div class="nav">
    <button type="button" onclick="go(1)">Atrás</button>
    <button type="button" onclick="enviar()">Cotizar</button>
  </div>
</div>

</form>

</div>
</div>

<script>
let tipo = '';
let cur = 0;

function setTipo(t, el) {
  tipo = t;
  document.querySelectorAll('.tipo div').forEach(d => d.classList.remove('active'));
  el.classList.add('active');

  const comercio = document.getElementById('actividadBox');
  const hogar = document.getElementById('hogarBox');
  const titulo = document.querySelector('#step-2 h3');

  if (t === 'comercio') {
    comercio.style.display = 'block';
    hogar.style.display = 'none';
    titulo.textContent = 'Coberturas del comercio';
  } else {
    comercio.style.display = 'none';
    hogar.style.display = 'block';
    titulo.textContent = 'Coberturas del hogar';
  }
}

function go(n) {
  document.getElementById('step-' + cur).classList.remove('active');
  cur = n;
  document.getElementById('step-' + cur).classList.add('active');

  document.querySelectorAll('.progress div').forEach((p,i)=>{
    p.classList.toggle('active', i <= n);
  });
}

function formatMoney(input) {
  let val = input.value.replace(/\D/g, '');
  input.value = val ? Number(val).toLocaleString('es-AR') : '';
}

function enviar() {

  let mensaje = `Hola! Quiero cotizar 👇\n\n`;

  if (tipo === 'hogar') {

    mensaje += `
🏠 Seguro de Hogar

Nombre: ${nombre.value} ${apellido.value}
Dirección: ${direccion.value}
Tel: ${tel.value}
Email: ${email.value}

Tipo propiedad: ${tipoProp.value}
Seguridad: ${seguridad.value}
Valor inmueble: USD ${valorInmueble.value}

Cristales: ${cristales.value}
Equipos: ${equipos.value}
TV: ${tv.value}
Notebook: ${notebook.value}
Bienes: ${bienes.value}
`;

  } else {

    mensaje += `
🏢 Seguro de Comercio

Nombre: ${nombre.value} ${apellido.value}
Dirección: ${direccion.value}
Tel: ${tel.value}
Email: ${email.value}

Actividad: ${actividad.value}
Valor contenido: ${contenidoCom.value}
Robo mercadería: ${roboMercaderia.value}
Incendio contenido: ${incendioCom.value}
Equipos electrónicos: ${equiposCom.value}
Cristales vidriera: ${vidrieraCom.value}
`;
  }

  window.open(`https://wa.me/5492914439314?text=${encodeURIComponent(mensaje)}`);
}
</script>

</body>
</html>
